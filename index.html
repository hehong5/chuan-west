<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>川西格聂南线智能规划 - 景点美食住宿一站式推荐</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet Map CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --primary: #1a5f7a;
            --primary-light: #57a0b8;
            --primary-dark: #0d3d4d;
            --accent: #c17f59;
            --accent-light: #e6a87a;
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --text-light: #6c757d;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.12);
            --radius: 16px;
            --radius-sm: 8px;
            --success: #27ae60;
            --warning: #f39c12;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 40px 20px 60px;
            text-align: center;
            position: relative;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        .header-content {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1rem;
            opacity: 0.9;
        }

        .route-tabs {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .route-tab {
            padding: 10px 24px;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.3s;
        }

        .route-tab:hover {
            background: rgba(255,255,255,0.2);
        }

        .route-tab.active {
            background: white;
            color: var(--primary);
            border-color: white;
        }

        /* Main Layout */
        .main-container {
            max-width: 1400px;
            margin: -30px auto 40px;
            padding: 0 16px;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 24px;
        }

        @media (max-width: 1024px) {
            .main-container {
                grid-template-columns: 1fr;
            }
        }

        /* Left Panel - Map & Places */
        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Map Card */
        .map-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .map-header {
            padding: 16px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .map-header h3 {
            font-size: 1rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .map-legend {
            display: flex;
            gap: 16px;
            font-size: 0.85rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .legend-dot.attraction { background: #e74c3c; }
        .legend-dot.food { background: #f39c12; }
        .legend-dot.hotel { background: #3498db; }

        #map {
            height: 400px;
            width: 100%;
        }

        /* Places List */
        .places-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .places-header {
            padding: 16px 20px;
            border-bottom: 1px solid #eee;
        }

        .places-header h3 {
            font-size: 1rem;
            color: var(--primary);
            margin-bottom: 12px;
        }

        .search-filter {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 10px 14px;
            border: 2px solid #e9ecef;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary-light);
        }

        .filter-btn {
            padding: 10px 16px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            background: #f1f3f4;
            color: var(--text);
        }

        .filter-btn:hover {
            background: #e2e6ea;
        }

        .filter-btn.active {
            background: var(--primary);
            color: white;
        }

        .places-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .place-item {
            padding: 16px 20px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            gap: 14px;
        }

        .place-item:hover {
            background: #f8f9fa;
        }

        .place-item:last-child {
            border-bottom: none;
        }

        .place-item.active {
            background: linear-gradient(90deg, rgba(26,95,122,0.08) 0%, transparent 100%);
            border-left: 3px solid var(--primary);
        }

        .place-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .place-info {
            flex: 1;
            min-width: 0;
        }

        .place-name {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .place-meta {
            font-size: 0.8rem;
            color: var(--text-light);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .place-tags {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .place-tag {
            padding: 3px 10px;
            background: #f1f3f4;
            border-radius: 10px;
            font-size: 0.75rem;
            color: var(--text-light);
        }

        .place-tag.attraction { background: #ffebee; color: #c62828; }
        .place-tag.food { background: #fff8e1; color: #f57f17; }
        .place-tag.hotel { background: #e3f2fd; color: #1565c0; }

        /* Right Panel - Detail Card */
        .right-panel {
            position: sticky;
            top: 20px;
        }

        .detail-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }

        .detail-header {
            height: 200px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .detail-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60%;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
        }

        .detail-header-content {
            position: absolute;
            bottom: 16px;
            left: 20px;
            right: 20px;
            z-index: 2;
            color: white;
        }

        .detail-header h2 {
            font-size: 1.5rem;
            margin-bottom: 6px;
        }

        .detail-badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .detail-badge {
            padding: 4px 12px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            font-size: 0.8rem;
        }

        .detail-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.9);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3;
        }

        .detail-body {
            padding: 20px;
        }

        .detail-section {
            margin-bottom: 24px;
        }

        .detail-section:last-child {
            margin-bottom: 0;
        }

        .section-title {
            font-size: 1rem;
            color: var(--primary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .section-icon {
            width: 28px;
            height: 28px;
            background: var(--primary);
            color: white;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }

        .detail-desc {
            font-size: 0.9rem;
            color: var(--text);
            line-height: 1.8;
        }

        /* Recommendation Cards */
        .rec-grid {
            display: grid;
            gap: 12px;
        }

        .rec-card {
            padding: 14px;
            background: #f8f9fa;
            border-radius: var(--radius-sm);
            transition: all 0.2s;
            cursor: pointer;
        }

        .rec-card:hover {
            background: #e9ecef;
            transform: translateX(4px);
        }

        .rec-title {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        .rec-desc {
            font-size: 0.8rem;
            color: var(--text-light);
        }

        .rec-rating {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 6px;
            font-size: 0.8rem;
        }

        .rating-stars {
            color: #ffc107;
        }

        .rec-tag {
            display: inline-block;
            padding: 2px 8px;
            background: var(--primary);
            color: white;
            border-radius: 8px;
            font-size: 0.7rem;
            margin-top: 6px;
        }

        /* Tips Box */
        .tips-box {
            background: linear-gradient(135deg, #fff8e1 0%, #ffecb3 100%);
            border-radius: var(--radius-sm);
            padding: 16px;
            border-left: 4px solid var(--accent);
        }

        .tips-box h4 {
            color: var(--accent);
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .tips-box ul {
            margin-left: 16px;
        }

        .tips-box li {
            font-size: 0.85rem;
            color: #5d4037;
            margin-bottom: 4px;
        }

        /* API Status */
        .api-status {
            padding: 16px 20px;
            background: #f8f9fa;
            border-top: 1px solid #eee;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }

        .status-row:last-child {
            margin-bottom: 0;
        }

        .status-label {
            color: var(--text-light);
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .status-dot.online { background: var(--success); }
        .status-dot.offline { background: #e74c3c; }

        /* Empty State */
        .empty-state {
            padding: 60px 20px;
            text-align: center;
            color: var(--text-light);
        }

        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: var(--text);
        }

        .empty-state p {
            font-size: 0.9rem;
        }

        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: var(--text-light);
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 12px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px 20px;
            color: var(--text-light);
            font-size: 0.85rem;
            border-top: 1px solid #eee;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.6rem;
            }

            .main-container {
                margin-top: -20px;
            }

            .right-panel {
                position: static;
            }

            .detail-card {
                max-height: none;
            }

            #map {
                height: 300px;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary-light);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>🗺️ 川西格聂南线智能规划</h1>
            <p>景点 · 美食 · 住宿 一站式智能推荐</p>
            <div class="route-tabs">
                <button class="route-tab active" data-route="1">线路一：稻城亚丁版</button>
                <button class="route-tab" data-route="2">线路二：木里泸沽湖版</button>
            </div>
        </div>
    </header>

    <main class="main-container">
        <!-- Left Panel -->
        <div class="left-panel">
            <!-- Map -->
            <div class="map-card">
                <div class="map-header">
                    <h3>🗺️ 路线地图</h3>
                    <div class="map-legend">
                        <span class="legend-item"><span class="legend-dot attraction"></span>景点</span>
                        <span class="legend-item"><span class="legend-dot food"></span>美食</span>
                        <span class="legend-item"><span class="legend-dot hotel"></span>住宿</span>
                    </div>
                </div>
                <div id="map"></div>
            </div>

            <!-- Places List -->
            <div class="places-card">
                <div class="places-header">
                    <h3>📍 行程地点</h3>
                    <div class="search-filter">
                        <input type="text" class="search-input" id="searchInput" placeholder="搜索地点...">
                        <button class="filter-btn active" data-filter="all">全部</button>
                        <button class="filter-btn" data-filter="attraction">景点</button>
                        <button class="filter-btn" data-filter="food">美食</button>
                        <button class="filter-btn" data-filter="hotel">住宿</button>
                    </div>
                </div>
                <div class="places-list" id="placesList">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="right-panel">
            <div class="detail-card" id="detailCard">
                <div class="empty-state" id="emptyState">
                    <div class="icon">🗺️</div>
                    <h3>选择地点查看详情</h3>
                    <p>点击左侧列表或地图标记查看景点介绍、美食推荐和住宿建议</p>
                </div>
                <div id="detailContent" style="display: none;">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>数据来源：大众点评API · 美团API · 携程API · 高德地图</p>
        <p style="margin-top: 6px;">高原自驾有风险，量力而行，安全永远是第一行程</p>
    </footer>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

        // ==================== Map ====================

            attribution: '© OpenStreetMap'
        }).addTo(map);

        const markers = {};

        // ==================== State ====================
        let currentRoute = 1;
        let currentFilter = 'all';
        let selectedPlace = null;

        // ==================== DOM Elements ====================
        const placesList = document.getElementById('placesList');
        const detailCard = document.getElementById('detailCard');
        const emptyState = document.getElementById('emptyState');
        const detailContent = document.getElementById('detailContent');
        const searchInput = document.getElementById('searchInput');
        const routeTabs = document.querySelectorAll('.route-tab');
        const filterBtns = document.querySelectorAll('.filter-btn');

        // ==================== Functions ====================
        function getTypeIcon(type) {
            const icons = {
                attraction: '🏔️',
                food: '🍜',
                hotel: '🏨',
                nature: '🌲'
            };
            return icons[type] || '📍';
        }

        function getTagClass(type) {
            const classes = {
                attraction: 'attraction',
                food: 'food',
                hotel: 'hotel',
                nature: 'nature'
            };
            return classes[type] || '';
        }

        function getTagName(type) {
            const names = {
                attraction: '景点',
                food: '美食',
                hotel: '住宿',
                nature: '自然'
            };
            return names[type] || '地点';
        }

        function renderStars(rating) {
            const full = Math.floor(rating);
            const half = rating % 1 >= 0.5 ? 1 : 0;
            const empty = 5 - full - half;
            return '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(empty);
        }

        function renderPlaces() {
            const searchTerm = searchInput.value.toLowerCase();
            
            const filtered = Object.entries(placesData).filter(([key, place]) => {
                if (place.route !== currentRoute) return false;
                if (currentFilter !== 'all' && place.type !== currentFilter) return false;
                if (searchTerm && !place.name.toLowerCase().includes(searchTerm)) return false;
                return true;
            });

            placesList.innerHTML = filtered.map(([key, place]) => `
                <div class="place-item ${selectedPlace === key ? 'active' : ''}" data-key="${key}">
                    <div class="place-icon">${getTypeIcon(place.type)}</div>
                    <div class="place-info">
                        <div class="place-name">${place.name}</div>
                        <div class="place-meta">
                            <span>${place.day}</span>
                            <span>海拔 ${place.altitude}</span>
                        </div>
                        <div class="place-tags">
                            <span class="place-tag ${getTagClass(place.type)}">${getTagName(place.type)}</span>
                        </div>
                    </div>
                </div>
            `).join('');

            // Add click listeners
            document.querySelectorAll('.place-item').forEach(item => {
                item.addEventListener('click', () => selectPlace(item.dataset.key));
            });

            // Update map markers
            updateMarkers();
        }

        function updateMarkers() {
            // Clear existing markers
            Object.values(markers).forEach(m => map.removeLayer(m));
            
            const bounds = [];
            
            Object.entries(placesData).forEach(([key, place]) => {
                if (place.route !== currentRoute) return;
                
                const color = place.type === 'attraction' ? '#e74c3c' : 
                              place.type === 'food' ? '#f39c12' : 
                              place.type === 'hotel' ? '#3498db' : '#27ae60';
                
                const icon = L.divIcon({
                    html: `<div style="background:${color};width:24px;height:24px;border-radius:50%;border:3px solid white;box-shadow:0 2px 5px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;color:white;font-size:12px;">${getTypeIcon(place.type)}</div>`,
                    className: 'custom-marker',
                    iconSize: [24, 24],
                    iconAnchor: [12, 12]
                });

                const marker = L.marker([place.lat, place.lng], { icon })
                    .addTo(map)
                    .bindPopup(`<b>${place.name}</b><br>${place.day}`);
                
                marker.on('click', () => selectPlace(key));
                
                markers[key] = marker;
                bounds.push([place.lat, place.lng]);
            });

            if (bounds.length > 0) {
                map.fitBounds(bounds, { padding: [30, 30] });
            }
        }

        function selectPlace(key) {
            selectedPlace = key;
            const place = placesData[key];
            
            if (!place) return;

            // Update list active state
            document.querySelectorAll('.place-item').forEach(item => {
                item.classList.toggle('active', item.dataset.key === key);
            });

            // Show detail
            emptyState.style.display = 'none';
            detailContent.style.display = 'block';

            // Render detail content
            detailContent.innerHTML = `
                <div class="detail-header" style="background-image: url('${place.image}')">
                    <button class="detail-close" onclick="closeDetail()">×</button>
                    <div class="detail-header-content">
                        <h2>${place.name}</h2>
                        <div class="detail-badges">
                            <span class="detail-badge">${place.day}</span>
                            <span class="detail-badge">海拔 ${place.altitude}</span>
                            <span class="detail-badge">${getTagName(place.type)}</span>
                        </div>
                    </div>
                </div>
                <div class="detail-body">
                    <div class="detail-section">
                        <div class="section-title">
                            <span class="section-icon">📖</span>
                            景点介绍
                        </div>
                        <p class="detail-desc">${place.description}</p>
                    </div>

                    <div class="detail-section">
                        <div class="section-title">
                            <span class="section-icon">🏔️</span>
                            附近景点
                        </div>
                        <div class="rec-grid">
                            ${place.nearbyAttractions.map(a => `
                                <div class="rec-card">
                                    <div class="rec-title">${a.name}</div>
                                    <div class="rec-desc">${a.desc}</div>
                                    <div class="rec-rating">
                                        <span class="rating-stars">${renderStars(a.rating)}</span>
                                        <span>${a.rating}</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="detail-section">
                        <div class="section-title">
                            <span class="section-icon">🍜</span>
                            特色美食
                        </div>
                        <div class="rec-grid">
                            ${place.nearbyFood.map(f => `
                                <div class="rec-card">
                                    <div class="rec-title">${f.name}</div>
                                    <div class="rec-desc">${f.desc}</div>
                                    <div class="rec-rating">
                                        <span class="rating-stars">${renderStars(f.rating)}</span>
                                        <span>${f.rating}</span>
                                    </div>
                                    <span class="rec-tag">${f.price}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="detail-section">
                        <div class="section-title">
                            <span class="section-icon">🏨</span>
                            住宿推荐
                        </div>
                        <div class="rec-grid">
                            ${place.nearbyHotels.map(h => `
                                <div class="rec-card">
                                    <div class="rec-title">${h.name}</div>
                                    <div class="rec-desc">${h.desc}</div>
                                    <div class="rec-rating">
                                        <span class="rating-stars">${renderStars(h.rating)}</span>
                                        <span>${h.rating}</span>
                                    </div>
                                    <span class="rec-tag">${h.price}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="detail-section">
                        <div class="tips-box">
                            <h4>💡 贴心提示</h4>
                            <ul>
                                ${place.tips.map(t => `<li>${t}</li>`).join('')}
                            </ul>
                        </div>
                    </div>
                </div>
            `;

            // Pan to marker
            if (markers[key]) {
                map.setView([place.lat, place.lng], 10);
            }
        }

        function closeDetail() {
            selectedPlace = null;
            emptyState.style.display = 'block';
            detailContent.style.display = 'none';
        }

        // ==================== Event Listeners ====================
        routeTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                routeTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentRoute = parseInt(tab.dataset.route);
                closeDetail();
                renderPlaces();
            });
        });

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderPlaces();
            });
        });

        searchInput.addEventListener('input', renderPlaces);

        // ==================== Init ====================
        renderPlaces();
    </script>
</body>
</html>
